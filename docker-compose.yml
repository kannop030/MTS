services:
  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"   # FastAPI
      - "7860:7860"   # Gradio UI
    volumes:
      - ./data:/app/data          # データ永続化
      - ./config:/app/config      # 設定ファイル
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  watcher:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "scripts/watch.py"]

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama   # モデルを永続化
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ollama_models:    # Ollamaモデルを永続化（再起動時の再DL不要）
