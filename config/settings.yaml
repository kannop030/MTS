whisper:
  model: "small"          # tiny / base / small / medium / large
  language: "ja"          # ja / en / auto
  device: "cpu"
  compute_type: "int8"    # CPU高速化

scene_detect:
  threshold: 30.0         # シーン変化感度（低いほど敏感）
  min_scene_len: 15       # 最小シーン長（フレーム数）

ocr:
  languages: ["ja", "en"]
  gpu: false

ollama:
  base_url: "http://ollama:11434"
  model: "qwen2.5:3b"
  timeout: 3600
  max_tokens: 4096

server:
  host: "0.0.0.0"
  port: 8000

ui:
  port: 7860

storage:
  upload_dir: "data/uploads"
  output_dir: "data/outputs"
  temp_dir: "data/temp"
  max_upload_size_mb: 2048
  delete_upload_on_success: true   # 処理正常終了後にアップロードファイルを削除

watcher:
  watch_dir: "data/watch"          # 監視フォルダ（ここにファイルを置くと自動処理）
  language: "ja"                   # 文字起こし言語 (ja / en / auto)
  enable_ocr: false                # スライドOCRを有効にする（動画のみ）
  enable_minutes: false            # 要約・議事録生成を有効にする
